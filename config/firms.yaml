# Firms tracked by the LAUNCH pipeline.
#
# Adding a firm requires:
#   1. A FirmName enum value in pipeline/core/value_objects.py
#   2. A FirmExtractor implementation in pipeline/application/use_cases/firm_extractors/
#   3. A new entry below
#
# Phase 2 (EDGAR Form D) is driven by the scraped partner roster in
# data/firm_graph.json, not by per-firm aliases — every scraped GP is
# queried as a "Director" on Form D Item 3.
